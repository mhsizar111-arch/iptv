<!DOCTYPE html>
<html>
<head>
  <title>MehEdi JOYPURHAT LIVE TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center/cover;
}

/* Glass Effect */
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
}

/* Top Right User */
#userCount{
  position:absolute;
  right:10px;
  top:5px;
  font-size:12px;
  color:#00ffcc;
}

/* Top Left Clock */
.topbar{
  padding:10px;
}

/* Title */
.mainTitle{
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

#channelName{
  text-align:center;
  font-size:14px;
  opacity:0.8;
}

/* Player */
.video-container{
  margin:10px;
  position:relative;
}

video{
  width:100%;
  border-radius:15px;
}

/* Brightness */
#brightnessOverlay{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
  border-radius:15px;
}

/* Volume UI */
#volumeUI{
  position:absolute;
  right:10px;
  top:50%;
  background:rgba(0,0,0,0.6);
  padding:5px;
  border-radius:10px;
  display:none;
}

/* Channel Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.ch{
  padding:10px;
  text-align:center;
  border-radius:15px;
}

/* Fav button */
.favBtn{
  margin-top:5px;
  font-size:12px;
  background:#ffcc00;
  color:#000;
  padding:3px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="userCount">👥 Online: 1</div>

<div class="topbar glass">
  <div id="clock"></div>
  <div id="banglaDate"></div>
</div>

<div class="mainTitle">MehEdi LIVE TV</div>
<div id="channelName">No Channel Selected</div>

<div class="video-container">
  <video id="video" controls></video>
  <div id="brightnessOverlay"></div>
  <div id="volumeUI">🔊</div>
</div>

<!-- ⭐ Favourite Section -->
<h3 style="padding-left:10px;">⭐ Favourite Channels</h3>
<div class="grid" id="favChannels"></div>

<!-- All Channels -->
<div class="grid" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// বাংলা ক্যালেন্ডার
const banglaMonths=["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];

function toBanglaNum(num){
  return num.toString().replace(/\d/g,d=>"০১২৩৪৫৬৭৮৯"[d]);
}

function getBanglaDate(date){
  const y=date.getFullYear();
  const m=date.getMonth()+1;
  const d=date.getDate();

  const by=y-593;
  const map=[14,14,15,16,16,16,15,15,15,15,14,14];

  let bm=(m+8)%12;
  let bd=d-map[m-1];

  if(bd<=0){
    bm=(bm-1+12)%12;
    bd=d+(30-map[m-1]);
  }

  return `${toBanglaNum(bd)} ${banglaMonths[bm]} ${toBanglaNum(by)}`;
}

// Clock
setInterval(()=>{
  let now=new Date();

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("en-GB",{timeZone:"Asia/Dhaka"})+"<br>"+
    now.toLocaleDateString("en-GB",{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  document.getElementById("banglaDate").innerText =
    getBanglaDate(now);
},1000);

// Fake users
setInterval(()=>{
  let n=Math.floor(Math.random()*50)+1;
  document.getElementById("userCount").innerText="👥 Online: "+n;
},3000);

// Channels
let channels=[];
let favourites = JSON.parse(localStorage.getItem("favChannels") || "[]");
let currentIndex=0;
let hls;

fetch('মাধবী.m3u')
.then(r=>r.text())
.then(data=>{
  let lines=data.split('\n');
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('#EXTINF')){
      let name=lines[i].split(',')[1];
      let url=lines[i+1];
      channels.push({name,url});
    }
  }
  showChannels(channels);
  showFav();
});

// Show Channels
function showChannels(list){
  let box=document.getElementById("channels");
  box.innerHTML="";

  list.forEach((ch,i)=>{
    let d=document.createElement("div");
    d.className="ch glass";

    d.innerHTML = `
      ${ch.name}
      <div class="favBtn" onclick="event.stopPropagation();toggleFav('${ch.name}','${ch.url}')">
        ⭐ Fav
      </div>
    `;

    d.onclick=()=>play(ch.url,i);
    box.appendChild(d);
  });
}

// Favourite toggle
function toggleFav(name,url){
  let index=favourites.findIndex(f=>f.url===url);

  if(index>-1){
    favourites.splice(index,1);
  }else{
    favourites.push({name,url});
  }

  localStorage.setItem("favChannels",JSON.stringify(favourites));
  showFav();
}

// Show Favourite
function showFav(){
  let box=document.getElementById("favChannels");
  box.innerHTML="";

  favourites.forEach((ch,i)=>{
    let d=document.createElement("div");
    d.className="ch glass";
    d.innerText=ch.name;

    d.onclick=()=>play(ch.url,i);
    box.appendChild(d);
  });
}

// Play
function play(url,i){
  currentIndex=i;
  let v=document.getElementById("video");

  document.getElementById("channelName").innerText=channels[i].name;

  if(hls)hls.destroy();

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
  }else{
    v.src=url;
  }
  v.play();
}

// Gesture
let startX=0,startY=0;
let isLeft=false,isRight=false;

const videoBox=document.querySelector(".video-container");
const video=document.getElementById("video");

videoBox.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;

  let w=window.innerWidth;
  isLeft=startX<w/2;
  isRight=startX>w/2;
});

videoBox.addEventListener("touchmove",(e)=>{
  let y=e.touches[0].clientY;
  let diffY=startY-y;

  // Volume
  if(isRight){
    video.volume=Math.max(0,Math.min(1,video.volume+diffY/300));
    document.getElementById("volumeUI").style.display="block";
    document.getElementById("volumeUI").innerText="🔊 "+Math.round(video.volume*100);
  }

  // Brightness
  if(isLeft){
    let o=document.getElementById("brightnessOverlay");
    let b=parseFloat(o.style.opacity||0)+diffY/300;
    o.style.opacity=Math.max(0,Math.min(0.7,b));
  }

  startY=y;
});

videoBox.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;
  let diffX=startX-endX;

  if(Math.abs(diffX)>80){
    diffX>0?nextChannel():prevChannel();
  }

  document.getElementById("volumeUI").style.display="none";
});

// Next / Prev
function nextChannel(){
  currentIndex=(currentIndex+1)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

function prevChannel(){
  currentIndex=(currentIndex-1+channels.length)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

</script>

</body>
</html>
