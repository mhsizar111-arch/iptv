<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MehEdi JOYPURHAT LIVE TV</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* Glass UI */
.glass{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  padding:15px;
  margin:10px;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* Player */
.player-container{
  position:relative;
  width:100%;
  border-radius:15px;
  overflow:hidden;
}

video{
  width:100%;
  background:black;
}

/* Overlay */
.controls{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.play-btn{
  margin:auto;
  font-size:50px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  padding:20px;
}

/* Bottom */
.bottom-controls{
  display:flex;
  align-items:center;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

.progress-bar{
  flex:1;
  height:5px;
  background:#555;
  margin:0 10px;
  position:relative;
}

#progress{
  height:100%;
  width:0%;
  background:#00ffcc;
}

.icons{
  display:flex;
  gap:10px;
}

/* Volume indicator */
#volumeUI{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  padding:5px 10px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<div class="glass">

  <!-- Header -->
  <div class="header">
    <div>
      <div id="time"></div>
      <div id="banglaDate" style="font-size:12px;"></div>
    </div>
    <div id="users">👤 0</div>
  </div>

  <!-- Title -->
  <h2>MehEdi LIVE TV</h2>
  <div id="channelName">No Channel Selected</div>

  <!-- Player -->
  <div class="player-container">

    <video id="videoPlayer"></video>

    <div class="controls">

      <div class="play-btn" onclick="togglePlay()">▶</div>

      <div class="bottom-controls">
        <span id="currentTime">0:00</span>

        <div class="progress-bar" onclick="seek(event)">
          <div id="progress"></div>
        </div>

        <span id="duration">0:00</span>

        <div class="icons">
          🔊 ⛶ ⋮
        </div>
      </div>

    </div>

    <div id="volumeUI">🔊 50%</div>

  </div>

</div>

<script>

/* VIDEO */
const video = document.getElementById("videoPlayer");
video.src = "https://www.w3schools.com/html/mov_bbb.mp4";

function togglePlay(){
  video.paused ? video.play() : video.pause();
}

video.addEventListener("timeupdate",()=>{
  let percent = (video.currentTime/video.duration)*100;
  document.getElementById("progress").style.width = percent+"%";

  document.getElementById("currentTime").innerText = format(video.currentTime);
  document.getElementById("duration").innerText = format(video.duration);
});

function seek(e){
  let rect = e.currentTarget.getBoundingClientRect();
  let x = e.clientX - rect.left;
  video.currentTime = (x/rect.width)*video.duration;
}

function format(t){
  let m = Math.floor(t/60);
  let s = Math.floor(t%60);
  return m+":"+(s<10?"0"+s:s);
}

/* TIME */
function updateTime(){
  let now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString("en-GB") + " | " +
    now.toLocaleDateString("en-GB",{weekday:'long'});

}
setInterval(updateTime,1000);

/* Bangla Date (simple) */
document.getElementById("banglaDate").innerText = "বাংলা তারিখ";

/* FAKE USER */
setInterval(()=>{
  document.getElementById("users").innerText = "👤 "+Math.floor(Math.random()*100);
},3000);

/* Gesture Volume */
let startY;

document.addEventListener("touchstart",(e)=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchmove",(e)=>{
  let moveY = e.touches[0].clientY;
  let diff = startY - moveY;

  video.volume += diff * 0.001;
  video.volume = Math.max(0,Math.min(1,video.volume));

  showVolume(Math.round(video.volume*100));

  startY = moveY;
});

function showVolume(v){
  let ui = document.getElementById("volumeUI");
  ui.style.display = "block";
  ui.innerText = "🔊 "+v+"%";

  setTimeout(()=>ui.style.display="none",1000);
}

</script>

</body>
</html>
