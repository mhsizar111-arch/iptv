<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MehEdi JOYPURHAT LIVE TV</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center/cover;
}

/* Glass */
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
}

/* Clock */
#bdClockBox{
  position:absolute;
  top:10px;
  left:10px;
  font-size:12px;
  line-height:1.3;
  color:#00ffcc;
}

#bdDate{
  font-size:11px;
  opacity:0.8;
}

/* Title */
.mainTitle{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

#channelName{
  text-align:center;
  font-size:14px;
  opacity:0.8;
}

/* Player */
.video-container{
  position:sticky;
  top:0;
  z-index:999;
  padding:10px;
}

video{
  width:100%;
  border-radius:15px;
}

#playOverlay{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  background:rgba(0,0,0,0.4);
  border-radius:15px;
}

/* Controls */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
  flex-wrap:wrap;
}

.btn{
  padding:8px 12px;
  border-radius:10px;
  background:rgba(0,0,0,0.5);
}

#volume{
  width:80px;
}

/* Search */
#search{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.ch{
  padding:10px;
  text-align:center;
  border-radius:15px;
  position:relative;
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
}

.fav{
  position:absolute;
  top:5px;
  right:8px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="bdClockBox">
  <div id="bdTime"></div>
  <div id="bdDate"></div>
</div>

<div class="mainTitle">MehEdi LIVE TV</div>
<div id="channelName">Select Channel</div>

<div class="video-container">
  <video id="video"></video>
  <div id="playOverlay">▶</div>

  <div class="controls">
    <div class="btn" onclick="prevChannel()">⏮</div>
    <div class="btn" onclick="nextChannel()">⏭</div>
    <div class="btn" onclick="togglePIP()">📺 PiP</div>
    <div class="btn" onclick="toggleMute()">🔇</div>
    <input type="range" id="volume" min="0" max="1" step="0.1">
    <div class="btn" onclick="fullScreen()">⛶</div>
    <div class="btn" onclick="takeShot()">📸</div>
  </div>
</div>

<input type="text" id="search" placeholder="Search channel...">
<div class="grid" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// 🔥 Clock (AM/PM)
const bdMonths=["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];

function toBN(n){
  return n.toString().replace(/\d/g,d=>"০১২৩৪৫৬৭৮৯"[d]);
}

function getBDDate(date){
  const y=date.getFullYear();
  const m=date.getMonth()+1;
  const d=date.getDate();

  const by=y-593;
  const map=[14,14,15,16,16,16,15,15,15,15,14,14];

  let bm=(m+8)%12;
  let bd=d-map[m-1];

  if(bd<=0){
    bm=(bm-1+12)%12;
    bd=d+(30-map[m-1]);
  }

  return `${toBN(bd)} ${bdMonths[bm]} ${toBN(by)}`;
}

function updateBDClock(){
  let now=new Date();

  let time=now.toLocaleTimeString("en-US",{
    timeZone:"Asia/Dhaka",
    hour12:true,
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });

  let day=now.toLocaleDateString("en-GB",{
    weekday:"long",
    timeZone:"Asia/Dhaka"
  });

  document.getElementById("bdTime").innerText = time + " ("+day+")";
  document.getElementById("bdDate").innerText = getBDDate(now);
}

setInterval(updateBDClock,1000);
updateBDClock();

// Channels
let channels=[];
let currentIndex=0;
let hls;

fetch('মাধবী.m3u')
.then(r=>r.text())
.then(data=>{
  let lines=data.split('\n');
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('#EXTINF')){
      let name=lines[i].split(',')[1];
      let url=lines[i+1];
      channels.push({name,url});
    }
  }
  showChannels(channels);
});

function showChannels(list){
  let box=document.getElementById("channels");
  box.innerHTML="";

  list.forEach((ch,i)=>{
    let d=document.createElement("div");
    d.className="ch glass";

    let favs=JSON.parse(localStorage.getItem("fav")||"[]");
    let isFav=favs.includes(ch.name);

    d.innerHTML=`
      <img class="logo" src="https://logo.clearbit.com/${ch.name.replace(/ /g,'')}.com">
      <br>${ch.name}
      <div class="fav">${isFav?"❤️":"🤍"}</div>
    `;

    d.onclick=()=>play(ch.url,i);

    d.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      toggleFav(ch.name);
    };

    box.appendChild(d);
  });
}

function play(url,i){
  currentIndex=i;
  let v=document.getElementById("video");

  document.getElementById("channelName").innerText=channels[i].name;

  if(hls)hls.destroy();

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
  }else{
    v.src=url;
  }

  v.play();
  document.getElementById("playOverlay").style.display="none";
}

document.getElementById("playOverlay").onclick=()=>{
  let v=document.getElementById("video");
  v.play();
  document.getElementById("playOverlay").style.display="none";
};

function nextChannel(){
  currentIndex=(currentIndex+1)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

function prevChannel(){
  currentIndex=(currentIndex-1+channels.length)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

// Search
document.getElementById("search").addEventListener("input",(e)=>{
  let val=e.target.value.toLowerCase();
  let filtered=channels.filter(c=>c.name.toLowerCase().includes(val));
  showChannels(filtered);
});

// Favourite
function toggleFav(name){
  let favs=JSON.parse(localStorage.getItem("fav")||"[]");

  if(favs.includes(name)){
    favs=favs.filter(f=>f!==name);
  }else{
    favs.push(name);
  }

  localStorage.setItem("fav",JSON.stringify(favs));
  showChannels(channels);
}

// Volume
document.getElementById("volume").oninput=function(){
  document.getElementById("video").volume=this.value;
};

// Mute
function toggleMute(){
  let v=document.getElementById("video");
  v.muted=!v.muted;
}

// Fullscreen
function fullScreen(){
  let v=document.getElementById("video");
  if(v.requestFullscreen){
    v.requestFullscreen();
  }
}

// Screenshot
function takeShot(){
  let video=document.getElementById("video");
  let canvas=document.createElement("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  let ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  let a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download="screenshot.png";
  a.click();
}

// PiP
async function togglePIP(){
  let video=document.getElementById("video");

  if(document.pictureInPictureElement){
    document.exitPictureInPicture();
  }else{
    await video.requestPictureInPicture();
  }
}

</script>

</body>
</html>
