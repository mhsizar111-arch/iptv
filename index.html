<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MehEdi LIVE IPTV</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;

  /* Bangladesh Flag Background */
  background:url('https://upload.wikimedia.org/wikipedia/commons/f/f9/Flag_of_Bangladesh.svg') no-repeat center;
  background-size:cover;
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  z-index:-1;
}

/* Header */
.header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

/* Player */
.video-container{
  padding:10px;
}

video{
  width:100%;
  border-radius:10px;
}

/* Controls */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

.btn{
  padding:8px 12px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
}

/* Channel Name */
#channelName{
  padding:10px;
}

/* Categories */
.categories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.cat{
  background:#222;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active{
  background:red;
}

/* Slider */
.row{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.row::-webkit-scrollbar{display:none;}

.card{
  min-width:140px;
  height:90px;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:.3s;
}

.card:hover{
  transform:scale(1.2);
}

/* LIVE BADGE */
.live{
  position:absolute;
  top:5px;
  left:5px;
  background:red;
  font-size:10px;
  padding:2px 5px;
  border-radius:4px;
}

/* Search */
#search{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="header">🔥 MehEdi LIVE IPTV </div>

<div class="video-container" id="playerArea">
  <video id="video" controls></video>

  <div class="controls">
    <div class="btn" onclick="prevChannel()">⏮</div>
    <div class="btn" onclick="nextChannel()">⏭</div>
    <div class="btn" onclick="toggleMute()">🔇</div>
    <div class="btn" onclick="fullScreen()">⛶</div>
  </div>
</div>

<div id="channelName">Select Channel</div>

<input type="text" id="search" placeholder="Search channel...">

<div class="categories" id="cats"></div>
<div class="row" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let channels=[];
let currentIndex=0;
let currentCategory="All";
let hls;

/* Load M3U */
fetch('M150BDIND.m3u')
.then(r=>r.text())
.then(data=>{
  let lines=data.split('\n');

  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('#EXTINF')){
      let name=lines[i].split(',')[1];

      let groupMatch = lines[i].match(/group-title="(.*?)"/);
      let category = groupMatch ? groupMatch[1] : "Other";

      let url=lines[i+1];

      channels.push({name,url,category});
    }
  }

  createCategories();
  showChannels(channels);
});

/* Categories */
function createCategories(){
  let box=document.getElementById("cats");

  let cats=["All", ...new Set(channels.map(c=>c.category))];

  cats.forEach(cat=>{
    let d=document.createElement("div");
    d.className="cat";
    d.innerText=cat;

    d.onclick=()=>{
      document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
      d.classList.add("active");
      currentCategory=cat;
      filterChannels();
    }

    box.appendChild(d);
  });

  box.firstChild.classList.add("active");
}

/* Show Channels */
function showChannels(list){
  let box=document.getElementById("channels");
  box.innerHTML="";

  list.forEach((ch)=>{
    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <div class="live">LIVE</div>
      <div>${ch.name}</div>
    `;

    d.onclick=()=>play(ch.url, channels.indexOf(ch));
    box.appendChild(d);
  });
}

/* Filter */
function filterChannels(){
  let filtered = channels.filter(c=>{
    return currentCategory==="All" || c.category===currentCategory;
  });

  showChannels(filtered);
}

/* Player */
function play(url,i){
  currentIndex=i;

  let v=document.getElementById("video");
  document.getElementById("channelName").innerText=channels[i].name;

  if(hls) hls.destroy();

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
    v.play();
  }else{
    v.src=url;
    v.play();
  }
}

/* Controls */
function nextChannel(){
  currentIndex=(currentIndex+1)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

function prevChannel(){
  currentIndex=(currentIndex-1+channels.length)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

function toggleMute(){
  let v=document.getElementById("video");
  v.muted=!v.muted;
}

function fullScreen(){
  let v=document.getElementById("video");
  if(v.requestFullscreen) v.requestFullscreen();
}

/* Swipe Gesture */
let startX=0;

document.getElementById("playerArea").addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

document.getElementById("playerArea").addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextChannel(); // swipe left
  }

  if(endX - startX > 50){
    prevChannel(); // swipe right
  }
});

/* Search */
document.getElementById("search").addEventListener("input",(e)=>{
  let val=e.target.value.toLowerCase();

  let filtered=channels.filter(c=>{
    return c.name.toLowerCase().includes(val) &&
    (currentCategory==="All" || c.category===currentCategory);
  });

  showChannels(filtered);
});
</script>

</body>
</html>
