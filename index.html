<!DOCTYPE html>
<html>
<head>
  <title>Mehedi Joypurhat Live TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {margin:0;background:#111;color:#fff;font-family:Arial;}
    header {background:red;padding:10px;text-align:center;font-size:20px;}
    input {width:95%;margin:10px;padding:8px;border-radius:5px;border:none;}
    video {width:100%;height:220px;background:black;}
    .grid {display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;}
    .ch {background:#222;padding:10px;text-align:center;border-radius:8px;cursor:pointer;}
    .ch:hover {background:red;}
  </style>
</head>

<body>

<header>📺 Mehedi Joypurhat Live TV</header>

<input type="text" id="search" placeholder="Search channel...">

<video id="video" controls></video>

<div class="grid" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let channels = [];

fetch('মাধবী.m3u')
.then(res => res.text())
.then(data => {
  let lines = data.split('\n');

  for (let i=0;i<lines.length;i++){
    if(lines[i].includes('#EXTINF')){
      let name = lines[i].split(',')[1];
      let url = lines[i+1];
      channels.push({name,url});
    }
  }

  showChannels(channels);
});

function showChannels(list){
  let box = document.getElementById("channels");
  box.innerHTML = "";

  list.forEach(ch=>{
    let div = document.createElement("div");
    div.className = "ch";
    div.innerText = ch.name;
    div.onclick = ()=> play(ch.url);
    box.appendChild(div);
  });
}

function play(url){
  let video = document.getElementById("video");

  if(Hls.isSupported()){
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }
}

document.getElementById("search").oninput = function(){
  let value = this.value.toLowerCase();
  let filtered = channels.filter(c=>c.name.toLowerCase().includes(value));
  showChannels(filtered);
}
</script>

</body>
</html>
