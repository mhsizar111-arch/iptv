<!DOCTYPE html>
<html>
<head>
  <title>MehEdi LIVE TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:#000;
}

#userCount{
  position:absolute;
  right:10px;
  top:5px;
  font-size:12px;
  color:#00ff99;
}

.topbar{
  padding:10px;
}

#clock{font-size:12px;}
#banglaDate{font-size:11px;opacity:0.8;}

h2{text-align:center;color:#00ffcc;}

.video-container{position:relative;}

video{width:100%;}

#brightnessOverlay{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.ch{
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="userCount">👥 Online: 1</div>

<div class="topbar">
  <div id="clock"></div>
  <div id="banglaDate"></div>
</div>

<h2 id="title">MehEdi JOYPURHAT LiVe TV</h2>

<div class="video-container" id="videoBox">
  <video id="video" controls></video>
  <div id="brightnessOverlay"></div>
</div>

<div class="grid" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// ===== বাংলা ক্যালেন্ডার =====
const banglaMonths=["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];

function toBanglaNum(num){
  return num.toString().replace(/\d/g,d=>"০১২৩৪৫৬৭৮৯"[d]);
}

function getBanglaDate(date){
  const y=date.getFullYear();
  const m=date.getMonth()+1;
  const d=date.getDate();

  const by=y-593;
  const map=[14,14,15,16,16,16,15,15,15,15,14,14];

  let bm=(m+8)%12;
  let bd=d-map[m-1];

  if(bd<=0){
    bm=(bm-1+12)%12;
    bd=d+(30-map[m-1]);
  }

  return `${toBanglaNum(bd)} ${banglaMonths[bm]} ${toBanglaNum(by)}`;
}

// ===== CLOCK =====
function updateClock(){
  let now=new Date();

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("en-GB",{timeZone:"Asia/Dhaka"})+"<br>"+
    now.toLocaleDateString("en-GB",{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  document.getElementById("banglaDate").innerText =
    getBanglaDate(now);
}
setInterval(updateClock,1000);

// ===== USER COUNT =====
setInterval(()=>{
  let n=Math.floor(Math.random()*50)+1;
  document.getElementById("userCount").innerText="👥 Online: "+n;
},3000);

// ===== CHANNEL SYSTEM =====
let channels=[];
let currentIndex=0;
let hls;

fetch('মাধবী.m3u')
.then(r=>r.text())
.then(data=>{
  let lines=data.split('\n');
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('#EXTINF')){
      let name=lines[i].split(',')[1];
      let url=lines[i+1];
      channels.push({name,url});
    }
  }
  showChannels(channels);
});

function showChannels(list){
  let box=document.getElementById("channels");
  box.innerHTML="";
  list.forEach((ch,i)=>{
    let d=document.createElement("div");
    d.className="ch";
    d.innerText=ch.name;
    d.onclick=()=>play(ch.url,i);
    box.appendChild(d);
  });
}

function play(url,i){
  currentIndex=i;
  let v=document.getElementById("video");
  document.getElementById("title").innerText=channels[i].name;

  if(hls)hls.destroy();

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
  }else{
    v.src=url;
  }
  v.play();
}

// ===== MX PLAYER GESTURE =====
let startX=0,startY=0;
let isLeft=false,isRight=false;

const videoBox=document.getElementById("videoBox");
const video=document.getElementById("video");

videoBox.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;

  let w=window.innerWidth;
  isLeft=startX<w/2;
  isRight=startX>w/2;
});

videoBox.addEventListener("touchmove",(e)=>{
  let x=e.touches[0].clientX;
  let y=e.touches[0].clientY;

  let diffY=startY-y;
  let diffX=startX-x;

  // Volume
  if(isRight && Math.abs(diffY)>Math.abs(diffX)){
    let v=video.volume + diffY/300;
    v=Math.max(0,Math.min(1,v));
    video.volume=v;
    startY=y;
  }

  // Brightness
  if(isLeft && Math.abs(diffY)>Math.abs(diffX)){
    let o=document.getElementById("brightnessOverlay");
    let cur=parseFloat(o.style.opacity||0);
    let b=cur + diffY/300;
    b=Math.max(0,Math.min(0.7,b));
    o.style.opacity=b;
    startY=y;
  }
});

videoBox.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;
  let diffX=startX-endX;

  if(Math.abs(diffX)>80){
    if(diffX>0) nextChannel();
    else prevChannel();
  }
});

function nextChannel(){
  currentIndex=(currentIndex+1)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

function prevChannel(){
  currentIndex=(currentIndex-1+channels.length)%channels.length;
  play(channels[currentIndex].url,currentIndex);
}

</script>

</body>
</html>
